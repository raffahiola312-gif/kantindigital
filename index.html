<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Saya</title>
    <style>
        /* CSS Dasar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        /* Navigasi */
        nav {
            background: #2c3e50;
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }

        nav h1 { font-size: 1.5rem; }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li { margin-left: 20px; }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: 500;
        }

        /* Hero Section */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            color: white;
            padding: 0 20px;
        }

        .hero h2 { font-size: 3rem; margin-bottom: 10px; }

        .btn {
            display: inline-block;
            background: #e74c3c;
            color: white;
            padding: 10px 25px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover { background: #c0392b; }

        /* Konten */
        .container {
            padding: 50px 10%;
            text-align: center;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav>
        <h1>MyBrand</h1>
        <ul>
            <li><a href="#">Beranda</a></li>
            <li><a href="#">Tentang</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h2>Selamat Datang di Website Saya</h2>
        <p>Membangun masa depan digital dengan kode yang bersih.</p>
        <a href="#" class="btn">Pelajari Lebih Lanjut</a>
    </header>

    <main class="container">
        <h3>Layanan Kami</h3>
        <p>Kami menyediakan solusi desain web, pengembangan aplikasi, dan strategi digital marketing.</p>
    </main>

    <footer>
        <p>&copy; 2024 Nama Kamu. Dibuat dengan &hearts;.</p>
    </footer>

</body>
</html>
